services:
  - type: web
    name: greenroute
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python web/prestart.py && gunicorn --workers 1 --threads 4 --timeout 180 --bind 0.0.0.0:$PORT web.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "0"
    autoDeploy: true
    healthCheckPath: /health
