<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Route Navigation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2ecc71; text-align: center; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 10px; margin: 5px 0 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌱 Green Route</h1>
    <form action="/calculate_route" method="POST">
        <label>City/Region:</label>
        <input type="text" name="city" required value="New Delhi, Delhi, India">

        <label>Start Coordinates:</label>
        <input type="text" name="start_coords" required value="28.6129, 77.2295">

        <label>Destination Coordinates:</label>
        <input type="text" name="end_coords" required value="28.6304, 77.2177">

        <button type="submit">Find Eco-Route</button>
    </form>
</div>
</body>
</html>
